name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test-package:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_os: linux
            asset_arch: x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            asset_os: macos
            asset_arch: x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_os: macos
            asset_arch: aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_os: windows
            asset_arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libssh2-1-dev pkg-config cmake

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl libssh2

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --target ${{ matrix.target }}

      - name: Test
        run: cargo test --target ${{ matrix.target }}

      - name: Clippy
        run: cargo clippy --target ${{ matrix.target }} -- -D warnings

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -czf "dist/repoman-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz" \
            -C target/${{ matrix.target }}/release repoman

      - name: Install WiX Toolset (Windows)
        if: runner.os == 'Windows'
        run: choco install wixtoolset -y

      - name: Install cargo-wix (Windows)
        if: runner.os == 'Windows'
        run: cargo install cargo-wix

      - name: Initialize WiX sources (Windows)
        if: runner.os == 'Windows'
        run: cargo wix init --force

      - name: Build MSI installer (Windows)
        if: runner.os == 'Windows'
        run: cargo wix --no-build

      - name: Package release archive + installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path target/${{ matrix.target }}/release/repoman.exe -DestinationPath dist/repoman-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.zip -Force
          Copy-Item -Path target/wix/*.msi -Destination dist/

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repoman-${{ matrix.asset_os }}-${{ matrix.asset_arch }}-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
